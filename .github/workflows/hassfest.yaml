name: Hassfest

on:
  workflow_dispatch:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout code
        uses: "actions/checkout@v4"
        
      - name: Run Hassfest
        uses: home-assistant/actions/hassfest@master
